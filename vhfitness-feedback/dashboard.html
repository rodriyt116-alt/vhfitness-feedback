<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Controle - VHFitness</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #1a1a1a; color: #ffffff; font-family: 'Segoe UI', sans-serif; }
        .bg-card-custom { background-color: #262626; border-radius: 15px; border: none; }
        .text-vh-green { color: #26b921; }
        .list-group-item { background-color: #333333; color: #ffffff; border: 1px solid #444444; }
    </style>
</head>
<body class="py-5">

    <div class="container">
        <div class="d-flex align-items-center justify-content-between mb-5">
            <div class="d-flex align-items-center">
                <img src="logotipo_vh.jpg" alt="VHFitness" class="img-fluid rounded-circle me-3" style="max-width: 80px;">
                <div>
                    <h1 class="fw-bold m-0 text-vh-green">VHFitness</h1>
                    <p class="text-muted m-0">Resultados em Tempo Real (Últimos 30 dias)</p>
                </div>
            </div>
            <div class="bg-card-custom p-3 text-center shadow-sm">
                <h3 id="total-votos" class="fw-bold text-vh-green m-0">0</h3>
                <small class="text-muted">Avaliações Recebidas</small>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-md-7">
                <div class="card bg-card-custom p-4 shadow-lg h-100">
                    <h4 class="fw-bold mb-4">📈 Médias das Categorias</h4>
                    <canvas id="graficoMedias" style="max-height: 350px;"></canvas>
                </div>
            </div>

            <div class="col-md-5">
                <div class="card bg-card-custom p-4 shadow-lg h-100">
                    <h4 class="fw-bold mb-3 text-vh-green">🚀 Elogios da Semana</h4>
                    <div id="lista-elogios" class="overflow-auto mb-4" style="max-height: 200px;">
                        <ul class="list-group" id="ul-elogios"><li class="list-group-item text-muted">A aguardar dados...</li></ul>
                    </div>

                    <h4 class="fw-bold mb-3 text-danger">💡 Sugestões de Melhoria</h4>
                    <div id="lista-sugestoes" class="overflow-auto" style="max-height: 200px;">
                        <ul class="list-group" id="ul-sugestoes"><li class="list-group-item text-muted">A aguardar dados...</li></ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="dashboard.js"></script>
</body>
</html>
